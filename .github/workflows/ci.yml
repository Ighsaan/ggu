name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

  migrate-database:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Skip when DATABASE_URL secret is missing
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret is not configured. Skipping remote migration."
            exit 0
          fi

      - name: Install dependencies
        if: ${{ env.DATABASE_URL != '' }}
        run: npm ci

      - name: Run Drizzle migrations
        if: ${{ env.DATABASE_URL != '' }}
        run: npm run db:migrate
